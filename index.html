<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Singer Web_Aplication</title>
</head>
<body>
    <form id="registroForm" class="campo_formulario">
        <h1>Singer Web Application</h1>
        <label for="name">Nombre del cantante:</label>
        <input type="text" id="name" name="name" required>
        <label for="edad">Edad:</label>
        <input type="edad" id="edad" name="edad" required>
        <label for="type">Tipo_Cancion:</label>
        <input type="type" id="type" name="type" required>
        <label for="instrument">Instrumento:</label>
        <input type="instrument" id="instrument" name="instrument" required>
        <input type="submit" value="Registrar">
        <div id="mensaje"></div>
    </form>
    <a href="listado.html">Ver listado de cantantes</a>
    <script>
    document.getElementById('registroForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const nombre = document.getElementById('name').value;
        const edad = document.getElementById('edad').value;
        const type = document.getElementById('type').value;
        const instrument = document.getElementById('instrument').value;
        const mensajeDiv = document.getElementById('mensaje');
        mensajeDiv.style.color = '#333';
        mensajeDiv.innerText = 'Registrando...';
        try {
            const response = await fetch('/api/guardar.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, edad, type, instrument })
            });
            const data = await response.json();
            if (response.ok) {
                mensajeDiv.style.color = 'green';
                mensajeDiv.innerText = data.message;
                document.getElementById('registroForm').reset();
            } else {
                mensajeDiv.style.color = 'red';
                mensajeDiv.innerText = data.error || 'Error desconocido';
            }
        } catch (error) {
            mensajeDiv.style.color = 'red';
            mensajeDiv.innerText = 'Error de conexión con el servidor.';
        }
    });
    </script>
</body>
</html>
