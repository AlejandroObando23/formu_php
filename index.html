<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Singer Web_Aplication</title>
</head>
<body>
    <form id="registroForm" class="campo_formulario">
        <h1>Formulario de Registro (PHP)</h1>
        
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>

        <input type="submit" value="Registrar">
        
        <div id="mensaje"></div>
    </form>

    <script>
    document.getElementById('registroForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const nombre = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const mensajeDiv = document.getElementById('mensaje');

        mensajeDiv.style.color = '#333';
        mensajeDiv.innerText = 'Registrando...';

        try {
            const response = await fetch('/api/guardar.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, email, password })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                mensajeDiv.style.color = 'green';
                mensajeDiv.innerText = data.message;
                document.getElementById('registroForm').reset();
            } else {
                mensajeDiv.style.color = 'red';
                mensajeDiv.innerText = data.error || 'Error desconocido';
            }
        } catch (error) {
            mensajeDiv.style.color = 'red';
            mensajeDiv.innerText = 'Error de conexión con el servidor.';
        }
    });
    </script>
</body>
</html>
